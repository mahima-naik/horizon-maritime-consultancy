<main align="center">
    <h2 style="color: #003366; margin-top: 0;">Cadet Portal</h2>
    <p style="color: #666; font-size: 0.9em; margin-bottom: 25px;">Enter your credentials to access your dashboard, mock tests, and mentor messages.</p>
    <center>
        <form >
        <table  cellpadding="10" cellspacing="0" border="0">
        
        <tr>
            <td>
                <label for="username">Cadet ID:</label>
            </td>
            <td>
                <input type="text" id="username" name="username">
            </td>
        </tr>
        
        <tr>
            <td>
                <label for="password">Password:</label>
            </td>
            <td>
                <input type="password" id="password" name="password">
            </td>
        </tr>
        
        <tr>
             <td colspan="2" align="center">

                <input type="submit" value="Log In Securely" style="background-color: #003366; color: white;">
            </td>
        </tr>

         </table>
        </form>
    </center>

        <p style="font-size: 0.85em; color: #666;">Not registered yet?<br> Register here</p>
        <center>
            <form>
                <table  cellpadding="10" cellspacing="0">
                
                <tr>
                    <td>
                        <label for="new-username">Enter email:</label>
                    </td>
                    <td>
                        <input type="email" id="new-username" name="new-username">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="full-name">Full Name:</label>
                    </td>
                    <td>
                        <input type="text" id="full-name" name="full-name">
                    </td>
                </tr>
                
                <tr>
                    <td>
                        <label for="new-password">Enter Password:</label>
                    </td>
                    <td>
                        <input type="password" id="new-password" name="new-password">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="confirm-password">Confirm Password:</label>
                    </td>
                    <td>
                        <input type="password" id="confirm-password" name="confirm-password">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Contact">Contact Number:</label>
                    </td>
                    <td>
                        <input type="text" id="Contact" name="Contact">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="dob">Date of Birth:</label>
                    </td>
                    <td>
                        <input type="date" id="dob" placeholder="Enter your DOB">
                </tr>
                <tr>
                    <td>
                        <label for="file">Upload 12th-grade PCM marksheet:</label>
                    </td>
                    <td>
                        <input type="file" id="file" name="file">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="file">Upload any Govt. ID proof</label>
                    </td>
                    <td>
                        <input type="file" id="file" name="file">
                    </td>
                </tr>
                <tr><td><label for="education">Education:</label></td>
                    <td>
                        <select id="education" name="education">
                            <option value="high-school">High School</option>
                            <option value="diploma">Diploma</option>
                            <option value="degree">Bachelor's Degree</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="institute">Institute Name:</label>
                    </td>
                    <td>
                        <input list="institutes">
                        <datalist id="institutes"> 
                            <option value="Marine Engineering College, Kerala">
                            <option value="Tolani Maritime Institute, Pune">
                            <option value="Loyola Institute of Maritime Studies, Chennai">
                            <option value="International Maritime Academy, Kochi">
                            <option value="Vels University, Chennai"> 
                        </datalist>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="checkbox" id="terms" name="terms">
                        <label for="terms">I agree to the terms and conditions</label>
                    </td>
                </tr>
                
                <tr>
                     <td colspan="2" align="center">

                        <input type="submit" value="Register Now" style="background-color: #003366; color: white;">
                    </td>
                </tr>
            </table>
            </form>

        </center>
